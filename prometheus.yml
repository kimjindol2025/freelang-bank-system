# Prometheus Configuration for FreeLang Bank System

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'freelang-bank'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets: []

# Load rules once and periodically evaluate them
rule_files:
  # - "alert_rules.yml"

scrape_configs:
  # Prometheus 자체 메트릭
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Go API Server
  - job_name: 'bank-api'
    static_configs:
      - targets: ['api:8080']
    metrics_path: '/metrics'
    scrape_interval: 10s

  # Dashboard (Nginx)
  - job_name: 'nginx'
    static_configs:
      - targets: ['dashboard:3000']

  # System Metrics
  - job_name: 'node'
    static_configs:
      - targets: ['localhost:9100']

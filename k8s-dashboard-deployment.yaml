apiVersion: apps/v1
kind: Deployment
metadata:
  name: bank-dashboard
  namespace: freelang-bank
  labels:
    app: bank-dashboard
    version: v1
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: bank-dashboard
  template:
    metadata:
      labels:
        app: bank-dashboard
        version: v1
    spec:
      serviceAccountName: bank-dashboard
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        fsGroup: 101

      containers:
      - name: dashboard
        image: bank-dashboard:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 3000
          protocol: TCP

        env:
        - name: REACT_APP_API_URL
          value: "http://bank-api-service:8080"

        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "200m"

        livenessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 10
          periodSeconds: 20
          timeoutSeconds: 3
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 2

        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL

      restartPolicy: Always
      terminationGracePeriodSeconds: 30

---
apiVersion: v1
kind: Service
metadata:
  name: bank-dashboard-service
  namespace: freelang-bank
  labels:
    app: bank-dashboard
spec:
  type: LoadBalancer
  selector:
    app: bank-dashboard
  ports:
  - name: http
    port: 80
    targetPort: http
    protocol: TCP
  sessionAffinity: None

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: bank-dashboard
  namespace: freelang-bank

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: bank-dashboard-role
  namespace: freelang-bank
rules:
- apiGroups: [""]
  resources: ["services", "endpoints"]
  verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: bank-dashboard-rolebinding
  namespace: freelang-bank
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: bank-dashboard-role
subjects:
- kind: ServiceAccount
  name: bank-dashboard
  namespace: freelang-bank
